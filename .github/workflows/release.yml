name: Package release

# Triggers when a GitHub Release is published. Also runnable manually.
#
# The plugin references Assembly-CSharp.dll (the game's proprietary
# assembly) which can't live on a public runner. The Makefile links it
# from the game install for local builds; for CI we verify the DLL
# compiles against the BepInEx/Unity NuGet surface alone (the game
# assembly is only needed for types sprinkled across the codebase).
# If compilation ever requires the stub, commit a publicized copy at
# VGBBoardAlways/lib/Assembly-CSharp.dll (method signatures only, no IL).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)package"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repo at release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Prepare lib stub
        run: |
          mkdir -p VGBBoardAlways/lib
          # Create a minimal placeholder so dotnet restore/build don't fail
          # on the Assembly-CSharp reference. The real DLL takes over at
          # runtime. If compilation ever needs actual types from the game
          # assembly, commit a publicized stub here.
          if [ ! -s VGBBoardAlways/lib/Assembly-CSharp.dll ]; then
            echo "::warning::Assembly-CSharp.dll stub missing — creating placeholder"
            printf '' > VGBBoardAlways/lib/Assembly-CSharp.dll
          fi

      - name: Build VGBoardAlways.dll
        run: dotnet build VGBBoardAlways/VGBBoardAlways.csproj -c Debug --nologo

      - name: Stage release layout
        id: stage
        run: |
          VERSION=$(grep 'PluginVersion =' VGBBoardAlways/Plugin.cs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_NAME="VGBoardAlways-v${VERSION}"
          PKG_DIR="dist/${PKG_NAME}"

          rm -rf "dist/${PKG_NAME}"
          mkdir -p "$PKG_DIR"

          cp VGBBoardAlways/bin/Debug/netstandard2.1/VGBoardAlways.dll "$PKG_DIR/"
          cp README.md "$PKG_DIR/"
          [ -f LICENSE ] && cp LICENSE "$PKG_DIR/" || true

          SIZE=$(du -sh "$PKG_DIR" | cut -f1)
          echo "Staged DLL + README — $SIZE at $PKG_DIR"

          echo "pkg_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Zip release bundle
        run: |
          (cd dist && zip -qr "${{ steps.stage.outputs.pkg_name }}.zip" "${{ steps.stage.outputs.pkg_name }}")
          ls -lh "dist/${{ steps.stage.outputs.pkg_name }}.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" "dist/${{ steps.stage.outputs.pkg_name }}.zip" --clobber
          echo "Uploaded ${{ steps.stage.outputs.pkg_name }}.zip to release $TAG"
